services:
  db:
    image: postgres:16
    container_name: microservice-order-db
    restart: always
    environment:
      POSTGRES_DB: microservice_order
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
    ports:
      - "5433:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data

  order-service:
    build: .
    container_name: order-service
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://finance:finance@db:5432/microservice_order
      ORDER_SERVICE_PORT: 50052
    ports:
      - "50052:50052"

volumes:
  order_db_data:
